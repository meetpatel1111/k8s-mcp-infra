apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-app-ingress
  namespace: default
  labels:
    app: weather-app
    version: v1
    component: ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: "/"
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
    nginx.ingress.kubernetes.io/use-regex: "false"
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS, PATCH"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    nginx.ingress.kubernetes.io/cors-max-age: "86400"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "16k"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    nginx.ingress.kubernetes.io/proxy-buffer-size: "32k"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-Frame-Options: SAMEORIGIN";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Content-Security-Policy: default-src 'self' 'unsafe-inline' 'unsafe-eval' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval' https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: https:; font-src 'self' data: https:; connect-src 'self' https:;";
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/enable-opentracing: "true"
    nginx.ingress.kubernetes.io/service-upstream: "true"
spec:
  tls:
    - hosts:
        - weather.${EXTERNAL_IP}.nip.io
        - api.${EXTERNAL_IP}.nip.io
        - dashboard.${EXTERNAL_IP}.nip.io
        - mcp.${EXTERNAL_IP}.nip.io
        - nginx.${EXTERNAL_IP}.nip.io
        - monitoring.${EXTERNAL_IP}.nip.io
        - grafana.${EXTERNAL_IP}.nip.io
        - prometheus.${EXTERNAL_IP}.nip.io
      secretName: weather-app-tls
  rules:
    # Weather Application - Main Dashboard
    - host: weather.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /weather
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /api-docs
            pathType: Exact
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: weather-service
                port:
                  number: 80

    # API Subdomain - Dedicated API access
    - host: api.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /weather
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80
          - path: /mcp
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80

    # Dashboard Subdomain - UI focused
    - host: dashboard.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-service
                port:
                  number: 80

    # MCP Integration Services
    - host: mcp.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mcp-weather-service
                port:
                  number: 8080
          - path: /health
            pathType: Exact
            backend:
              service:
                name: mcp-weather-service
                port:
                  number: 8080

    # Nginx Reverse Proxy
    - host: nginx.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: nginx-service
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: nginx-service
                port:
                  number: 9113

    # Monitoring Services
    - host: monitoring.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80
          - path: /grafana
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80

    # Grafana Direct Access
    - host: grafana.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-grafana
                port:
                  number: 80

    # Prometheus Direct Access
    - host: prometheus.${EXTERNAL_IP}.nip.io
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: prometheus-kube-prometheus-stack
                port:
                  number: 9090
