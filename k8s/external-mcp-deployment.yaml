apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-weather-analyzer
  namespace: default
  labels:
    app: mcp-weather
    component: service-account
automountServiceAccountToken: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-weather
  namespace: default
  labels:
    app: mcp-weather
    component: mcp-integration
    version: v1
spec:
  replicas: ${MCP_REPLICAS_MIN}
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: mcp-weather
      component: mcp-integration
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mcp-weather
        component: mcp-integration
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: mcp-weather-analyzer
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: mcp-weather
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app: mcp-weather
      volumes:
        - name: mcp-config
          emptyDir:
            sizeLimit: 64Mi
        - name: mcp-cache
          emptyDir:
            sizeLimit: 128Mi
        - name: mcp-tmp
          emptyDir:
            sizeLimit: 32Mi
      # Init containers for configuration
      initContainers:
        - name: mcp-auth-add-${MCP_PROVIDER}
          image: ${MCP_IMAGE}
          env:
            - name: AI_PROVIDER
              value: "${MCP_PROVIDER}"
            - name: NODE_ENV
              value: "production"
            - name: ${MCP_PROVIDER^^}_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secret
                  key: ${MCP_PROVIDER^^}_API_KEY
          volumeMounts:
            - name: mcp-config
              mountPath: /app/config
          command:
            - /bin/sh
            - -c
            - |
              echo "Setting up MCP configuration for ${MCP_PROVIDER}"
              mkdir -p /app/config
              echo "provider=${MCP_PROVIDER}" > /app/config/mcp-config.json
              echo "weather_api_url=http://weather-service:80" >> /app/config/mcp-config.json
              echo "node_env=production" >> /app/config/mcp-config.json
              echo "api_key=$(echo $${MCP_PROVIDER^^}_API_KEY)" >> /app/config/mcp-config.json

        - name: mcp-auth-default-${MCP_PROVIDER}
          image: ${MCP_IMAGE}
          env:
            - name: AI_PROVIDER
              value: "${MCP_PROVIDER}"
          volumeMounts:
            - name: mcp-config
              mountPath: /app/config
          command:
            - /bin/sh
            - -c
            - |
              echo "Setting default provider to ${MCP_PROVIDER}"
              echo "default_provider=${MCP_PROVIDER}" > /app/config/default-provider.json

      containers:
        - name: mcp-weather
          image: ${MCP_IMAGE}
          imagePullPolicy: IfNotPresent
          args: ["serve"]
          env:
            - name: AI_PROVIDER
              value: "${MCP_PROVIDER}"
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "8080"
            - name: WEATHER_API_BASE_URL
              value: "http://weather-service:80"
            - name: CONFIG_PATH
              value: "/app/config/mcp-config.json"
            - name: DEFAULT_PROVIDER_PATH
              value: "/app/config/default-provider.json"
            # AI API Keys (both supported)
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secret
                  key: OPENAI_API_KEY
              optional: true
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: weather-app-secret
                  key: GEMINI_API_KEY
              optional: true
            # Provider-specific model configurations
            - name: OPENAI_MODEL
              value: "gpt-4o"
            - name: GEMINI_MODEL
              value: "gemini-2.5-flash"
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: mcp-config
              mountPath: /app/config
              readOnly: true
            - name: mcp-cache
              mountPath: /app/cache
            - name: mcp-tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 24
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
---
apiVersion: v1
kind: Service
metadata:
  name: mcp-weather-service
  namespace: default
  labels:
    app: mcp-weather
    component: mcp-integration
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: mcp-weather
    component: mcp-integration
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: metrics
      port: 9090
      targetPort: 9090
      protocol: TCP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mcp-weather-hpa
  namespace: default
  labels:
    app: mcp-weather
    component: hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mcp-weather
  minReplicas: ${MCP_REPLICAS_MIN}
  maxReplicas: ${MCP_REPLICAS_MAX}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
        value: 50
          periodSeconds: 60
        - type: Pods
          value: 1
          periodSeconds: 60
      selectPolicy: Min
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mcp-weather-pdb
  namespace: default
  labels:
    app: mcp-weather
    component: pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mcp-weather
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: mcp-weather-monitor
  namespace: default
  labels:
    app: mcp-weather
    component: monitoring
spec:
  selector:
    matchLabels:
      app: mcp-weather
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
