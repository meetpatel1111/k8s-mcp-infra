name: One-Click Weather App Deployment (Azure)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, test)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test]
      action:
        description: 'Terraform action (apply, destroy, refresh)'
        required: true
        default: 'apply'
        type: choice
        options: [apply, destroy, refresh]
      mcp_provider:
        description: 'AI Provider for weather insights'
        required: true
        default: 'openai'
        type: choice
        options: [openai, google]
      mcp_repo_url:
        description: 'MCP Repository URL (e.g., https://github.com/vikas0105/MCP_Servers)'
        required: true
        default: 'https://github.com/vikas0105/MCP_Servers'
        type: string
      app_repo_url:
        description: 'App Repository URL (e.g., https://github.com/meetpatel1111/WeatherPulse)'
        required: true
        default: 'https://github.com/meetpatel1111/WeatherPulse'
        type: string
      app_repo_branch:
        description: 'App Repository Branch'
        required: true
        default: 'main'
        type: string
      app_dockerfile:
        description: 'Dockerfile content for app (leave empty for default)'
        required: false
        default: ''
        type: string
      run_security_scan:
        description: 'Run security scans only?'
        required: false
        default: false
        type: boolean
      run_terraform:
        description: 'Run Terraform deploy?'
        required: false
        default: false
        type: boolean
      run_application_deployment:
        description: 'Run Weather App deployment?'
        required: false
        default: false
        type: boolean

env:
  TF_DIR: terraform
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  BACKEND_RG: tfstate-uks-shared-rg
  BACKEND_SA: sttfstateshared
  BACKEND_CONTAINER: tfstate
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

# ─────────────────────────────────────────────────────────────────────────────
jobs:
# ─────────────────────────────────────────────────────────────────────────────

  # ───────────────────────────── security-scan ────────────────────────────────
  security-scan:
    if: ${{ github.event.inputs.run_security_scan == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Run tfsec (IaC)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_DIR }}
          format: csv
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy scan on base images
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: node:18-alpine
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  # ─────────────────────────── terraform-k8s ──────────────────────────────────
  terraform-k8s:
    if: ${{ github.event.inputs.run_terraform == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          for ns in Microsoft.ContainerService Microsoft.Network Microsoft.Compute \
                    Microsoft.Storage Microsoft.ContainerRegistry; do
            az provider register --namespace "$ns" --wait
          done
          az provider show --namespace Microsoft.ContainerService --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Network            --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Compute            --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Storage            --query "registrationState" -o tsv
          az provider show --namespace Microsoft.ContainerRegistry  --query "registrationState" -o tsv

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform Cache
        run: |
          cd "${TF_DIR}"
          rm -rf .terraform terraform.lock.hcl
          echo "Terraform cache cleaned"

      - name: Set ENV
        run: |
          echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          echo "TFVARS_FILE=${{ github.event.inputs.environment }}.tfvars" >> $GITHUB_ENV

      - name: Pre-bootstrap Terraform backend
        run: |
          chmod +x ./terraform/bootstrap/prebootstrap.sh
          ./terraform/bootstrap/prebootstrap.sh \
            "${BACKEND_RG}" "${BACKEND_SA}" "${BACKEND_CONTAINER}" "eastus"

      - name: Terraform Init
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${BACKEND_RG}" \
            -backend-config="storage_account_name=${BACKEND_SA}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=aks/${{ github.event.inputs.environment }}.tfstate"

      - name: Terraform Fmt
        run: |
          cd "${TF_DIR}"
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd "${TF_DIR}"
          terraform validate

      - name: Execute Terraform
        run: |
          cd "${TF_DIR}"
          case "${{ github.event.inputs.action }}" in
            apply)
              terraform plan   -input=false -var-file="${TFVARS_FILE}" -out=tfplan
              terraform apply  -input=false -auto-approve tfplan
              ;;
            destroy)
              terraform plan   -destroy -input=false -var-file="${TFVARS_FILE}" -out=tfplan-destroy
              terraform apply  -input=false -auto-approve tfplan-destroy
              ;;
            refresh)
              terraform refresh -input=false -var-file="${TFVARS_FILE}"
              ;;
            *)
              echo "Unknown action: ${{ github.event.inputs.action }}"
              exit 1
              ;;
          esac

  # ──────────────────────────── weather-app-deploy ────────────────────────────
  weather-app-deploy:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          for ns in Microsoft.ContainerService Microsoft.Network Microsoft.Compute \
                    Microsoft.Storage Microsoft.ContainerRegistry; do
            az provider register --namespace "$ns" --wait
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform Cache
        run: |
          cd "${TF_DIR}"
          rm -rf .terraform terraform.lock.hcl

      # FIX: every job that calls `terraform output` must init first
      - name: Terraform Init (for reading outputs)
        run: |
          cd "${TF_DIR}"
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${BACKEND_RG}" \
            -backend-config="storage_account_name=${BACKEND_SA}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=aks/${{ github.event.inputs.environment }}.tfstate"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Verify kubectl version
        run: kubectl version --client

      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      # ---------- ACR login ----------
      - name: Fetch ACR outputs & login
        run: |
          ACR_NAME=$(terraform -chdir="${TF_DIR}" output -raw acr_name)
          ACR_SERVER=$(terraform -chdir="${TF_DIR}" output -raw acr_login_server)
          echo "ACR_NAME=$ACR_NAME"     >> $GITHUB_ENV
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          az acr login --name "$ACR_NAME"

      # ---------- Build & push app image ----------
      # FIX: write APP_IMAGE to $GITHUB_ENV here; it is consumed in the NEXT step
      - name: Build & Push App Image (ACR)
        run: |
          TAG="${{ github.event.inputs.environment }}"
          APP_IMAGE="${ACR_SERVER}/app:${TAG}"
          echo "APP_IMAGE=$APP_IMAGE" >> $GITHUB_ENV    # available from next step onward

          git clone ${{ github.event.inputs.app_repo_url }}
          REPO_NAME=$(basename "${{ github.event.inputs.app_repo_url }}" .git)
          cd "$REPO_NAME"

          if [ "${{ github.event.inputs.app_repo_branch }}" != "main" ]; then
            git checkout "${{ github.event.inputs.app_repo_branch }}"
          fi

          if [ -n "${{ github.event.inputs.app_dockerfile }}" ]; then
            echo "${{ github.event.inputs.app_dockerfile }}" > Dockerfile
          elif [ ! -f "Dockerfile" ]; then
            printf 'FROM nginx:alpine\nCOPY index.html  /usr/share/nginx/html/\nCOPY script.js   /usr/share/nginx/html/\nCOPY styles.css  /usr/share/nginx/html/\nRUN echo '"'"'server { listen 80; root /usr/share/nginx/html; index index.html; location / { try_files $uri $uri/ /index.html; } }'"'"'  > /etc/nginx/conf.d/default.conf\nEXPOSE 80\nCMD ["nginx", "-g", "daemon off;"]\n' > Dockerfile
          fi

          docker build --no-cache -t "$APP_IMAGE" .
          docker push "$APP_IMAGE"

      # FIX: APP_IMAGE is now available from $GITHUB_ENV (set in previous step)
      - name: Run Trivy scan on app image
        if: ${{ github.event.inputs.run_security_scan == 'true' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.APP_IMAGE }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # ---------- Kubernetes secrets ----------
      - name: Create Kubernetes Secrets
        run: |
          kubectl create secret generic weather-app-secret \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --from-literal=OPEN_METEO_API_KEY=${{ secrets.OPEN_METEO_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # ---------- HPA / replica settings ----------
      - name: Export replicas and HPA settings from TFVARS
        run: |
          ENVFILE="${TF_DIR}/${{ github.event.inputs.environment }}.tfvars"

          K8SGPT_REPLICAS=$(grep k8sgpt_replicas "$ENVFILE" | awk -F'=' '{print $2}' | xargs)
          APP_REPLICAS=$(grep app_replicas      "$ENVFILE" | awk -F'=' '{print $2}' | xargs || echo "2")
          K8SGPT_HPA_MAX=$(grep k8sgpt_hpa_max  "$ENVFILE" | awk -F'=' '{print $2}' | xargs)
          APP_HPA_MAX=$(grep app_hpa_max        "$ENVFILE" | awk -F'=' '{print $2}' | xargs || echo "5")

          echo "K8SGPT_REPLICAS=$K8SGPT_REPLICAS"   >> $GITHUB_ENV
          echo "APP_REPLICAS=$APP_REPLICAS"           >> $GITHUB_ENV
          echo "K8SGPT_HPA_MIN=$K8SGPT_REPLICAS"     >> $GITHUB_ENV
          echo "K8SGPT_HPA_MAX=$K8SGPT_HPA_MAX"       >> $GITHUB_ENV
          echo "APP_HPA_MIN=$APP_REPLICAS"             >> $GITHUB_ENV
          echo "APP_HPA_MAX=$APP_HPA_MAX"               >> $GITHUB_ENV

      # ---------- Install ingress-nginx & wait for LB ----------
      - name: Deploy ingress-nginx & wait for LoadBalancer IP
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.13.0/deploy/static/provider/cloud/deploy.yaml

          kubectl wait --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=300s

          echo "Waiting for ingress-nginx LoadBalancer IP..."
          EXTERNAL_IP=""
          for i in $(seq 1 30); do
            EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            [ -z "$EXTERNAL_IP" ] && EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "LB IP: $EXTERNAL_IP"
              break
            fi
            echo "Attempt $i/30 — LB IP not yet assigned. Sleeping 10s..."
            sleep 10
          done

          if [ -z "$EXTERNAL_IP" ]; then
            echo "ERROR: LB IP not assigned within timeout."
            exit 1
          fi

          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV

      # ---------- Deploy app manifests ----------
      # FIX: use explicit -final.yaml files; never overwrite the template in-place;
      #      never use `kubectl apply -f <directory>` for template directories
      - name: Apply app Kubernetes manifests
        run: |
          export APP_IMAGE="${{ env.APP_IMAGE }}"
          export EXTERNAL_IP="${{ env.EXTERNAL_IP }}"
          export ENVIRONMENT="${{ github.event.inputs.environment }}"
          export APP_REPLICAS="${{ env.APP_REPLICAS }}"
          export APP_HPA_MIN="${{ env.APP_HPA_MIN }}"
          export APP_HPA_MAX="${{ env.APP_HPA_MAX }}"

          envsubst < k8s/app-deployment.yaml > k8s/app-deployment-final.yaml
          kubectl apply -f k8s/app-deployment-final.yaml

          envsubst < k8s/main-ingress.yaml > k8s/main-ingress-final.yaml
          kubectl apply -f k8s/main-ingress-final.yaml

          kubectl -n default rollout status deployment/app --timeout=120s \
            || echo "app rollout timed out or deployment not found (continuing)"

      # ---------- Verify ----------
      - name: Verify app deployments
        run: |
          echo "=== Weather App Deployment Status ==="
          kubectl get pods    -l app=weather
          kubectl get services -l app=weather
          kubectl get ingress  -l app=weather

          echo "=== Access Information ==="
          echo "Weather App: http://weather.${{ env.EXTERNAL_IP }}.nip.io"

  # ──────────────────────────── mcp-server-deploy ─────────────────────────────
  mcp-server-deploy:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    needs: weather-app-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          for ns in Microsoft.ContainerService Microsoft.Network Microsoft.Compute \
                    Microsoft.Storage Microsoft.ContainerRegistry; do
            az provider register --namespace "$ns" --wait
          done

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform Cache
        run: |
          cd "${TF_DIR}"
          rm -rf .terraform terraform.lock.hcl

      # FIX: init is required in every job that uses terraform output
      - name: Terraform Init (for reading outputs)
        run: |
          cd "${TF_DIR}"
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${BACKEND_RG}" \
            -backend-config="storage_account_name=${BACKEND_SA}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=aks/${{ github.event.inputs.environment }}.tfstate"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Verify kubectl version
        run: kubectl version --client

      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      # ---------- ACR ----------
      - name: Fetch ACR outputs & login
        run: |
          ACR_NAME=$(terraform -chdir="${TF_DIR}" output -raw acr_name)
          ACR_SERVER=$(terraform -chdir="${TF_DIR}" output -raw acr_login_server)
          echo "ACR_NAME=$ACR_NAME"     >> $GITHUB_ENV
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          az acr login --name "$ACR_NAME"

      - name: Create Kubernetes Secret for MCP Servers
        run: |
          kubectl create secret generic mcp-servers-secret \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      # FIX: MCP_IMAGE written to $GITHUB_ENV here; consumed in the NEXT step
      - name: Build & Push MCP Server Image (ACR)
        run: |
          TAG="${{ github.event.inputs.environment }}"
          MCP_IMAGE="${ACR_SERVER}/mcp-servers:${TAG}"
          echo "MCP_IMAGE=$MCP_IMAGE" >> $GITHUB_ENV    # available from next step onward

          git clone ${{ github.event.inputs.mcp_repo_url }}
          cd MCP_Servers
          git checkout codex/build-mcp-server-for-kubernetes

          docker build --no-cache -t "$MCP_IMAGE" .
          docker push "$MCP_IMAGE"

      - name: Run Trivy scan on MCP Server image
        if: ${{ github.event.inputs.run_security_scan == 'true' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.MCP_IMAGE }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

      # FIX: MCP_IMAGE is now available from env (set in previous step)
      # FIX: write to deployment-final.yaml, never overwrite the template
      - name: Deploy MCP Server to Kubernetes
        run: |
          export MCP_IMAGE="${{ env.MCP_IMAGE }}"
          echo "DEBUG MCP_IMAGE=$MCP_IMAGE"

          envsubst '${MCP_IMAGE}' < k8s/mcp-server/deployment.yaml \
            > k8s/mcp-server/deployment-final.yaml

          kubectl apply -f k8s/mcp-server/rbac.yaml
          kubectl apply -f k8s/mcp-server/deployment-final.yaml
          kubectl apply -f k8s/mcp-server/service.yaml

      # FIX: wait for LB IP with retry before substituting into ingress template
      # FIX: write to ingress-final.yaml, apply -final; never apply the raw template
      - name: Create MCP Server Ingress
        run: |
          echo "Waiting for ingress-nginx LoadBalancer IP..."
          EXTERNAL_IP=""
          for i in $(seq 1 30); do
            EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "Found LB IP: $EXTERNAL_IP"
              break
            fi
            echo "Attempt $i/30 — waiting... sleeping 10s"
            sleep 10
          done

          if [ -z "$EXTERNAL_IP" ]; then
            echo "ERROR: LB IP not assigned within timeout."
            exit 1
          fi

          export EXTERNAL_IP
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV

          envsubst '${EXTERNAL_IP}' < k8s/mcp-server/ingress.yaml \
            > k8s/mcp-server/ingress-final.yaml

          kubectl apply -f k8s/mcp-server/ingress-final.yaml

      - name: Wait for MCP Server rollout
        run: |
          kubectl -n sre-copilot wait \
            --for=condition=available deployment/k8s-mcp-web \
            --timeout=300s

      - name: Verify MCP Server deployment
        run: |
          echo "=== MCP Server Pods ==="
          kubectl -n sre-copilot get pods

          echo "=== MCP Server Services ==="
          kubectl -n sre-copilot get services

          echo "=== MCP Server Ingress ==="
          kubectl -n sre-copilot get ingress

          echo "=== MCP Server Logs (last 20 lines) ==="
          kubectl -n sre-copilot logs deploy/k8s-mcp-web --tail=20

      - name: Display all URLs
        run: |
          echo ""
          echo "🎉 Deployment complete!"
          echo ""
          echo "🌦️  Weather App:   http://app.${{ env.EXTERNAL_IP }}.nip.io/"
          echo "🔧  MCP Server:   http://k8s-mcp.${{ env.EXTERNAL_IP }}.nip.io/"
          echo ""
          echo "=== All Ingresses ==="
          kubectl get ingress -A

          echo "=== All Pods ==="
          kubectl get pods -A -o wide

          echo "=== HPA ==="
          kubectl get hpa -A || echo "No HPA resources found"

          echo "=== Service Monitors ==="
          kubectl get servicemonitors -A || echo "No ServiceMonitors found"

      - name: Test MCP Service health (port-forward)
        run: |
          PROVIDER="${{ github.event.inputs.mcp_provider }}"
          SERVICE_NAME="k8s-mcp-web"
          LOCAL_PORT="8000"

          echo "Testing MCP service health via port-forward ($SERVICE_NAME)..."
          kubectl port-forward service/$SERVICE_NAME ${LOCAL_PORT}:8080 &
          PF_PID=$!
          sleep 5

          curl -sf "http://localhost:${LOCAL_PORT}/health" \
            && echo "MCP health OK" \
            || echo "MCP service not ready yet (non-fatal)"

          kill $PF_PID 2>/dev/null || true

  # ──────────────────────────── verify-deployment ─────────────────────────────
  verify-deployment:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    needs: [weather-app-deploy, mcp-server-deploy]
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      # FIX: init required before any terraform output call
      - name: Terraform Init (for reading outputs)
        run: |
          cd "${TF_DIR}"
          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${BACKEND_RG}" \
            -backend-config="storage_account_name=${BACKEND_SA}" \
            -backend-config="container_name=${BACKEND_CONTAINER}" \
            -backend-config="key=aks/${{ github.event.inputs.environment }}.tfstate"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      - name: Verify Kubernetes Deployments & Services
        run: |
          echo "=== Nodes ==="
          kubectl get nodes -o wide

          echo "=== All Deployments ==="
          kubectl get deployments -A

          echo "=== All Services ==="
          kubectl get svc -A

          echo "=== All Ingresses ==="
          kubectl get ingress -A

          echo "=== HPA ==="
          kubectl get hpa -A || echo "No HPA resources"

      - name: Test Weather App endpoints
        run: |
          EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}')

          echo "Testing /health..."
          curl -sf "http://weather.${EXTERNAL_IP}.nip.io/health" || exit 1

          echo "Testing /weather/current/London..."
          curl -sf "http://weather.${EXTERNAL_IP}.nip.io/weather/current/London" || exit 1

          echo "Testing /mcp/weather (POST)..."
          curl -sf -X POST "http://weather.${EXTERNAL_IP}.nip.io/mcp/weather" \
            -H "Content-Type: application/json" \
            -d '{"method":"get_current_weather","params":{"city":"London"}}' || exit 1

          echo "All health checks passed ✅"