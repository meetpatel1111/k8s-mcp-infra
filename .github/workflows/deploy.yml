name: One-Click Weather App Deployment (Azure)

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev, test)'
        required: true
        default: 'dev'
        type: choice
        options: [dev, test]
      action:
        description: 'Terraform action (apply, destroy, refresh)'
        required: true
        default: 'apply'
        type: choice
        options: [apply, destroy, refresh]
      mcp_provider:
        description: 'AI Provider for weather insights'
        required: true
        default: 'openai'
        type: choice
        options: [openai, google]
      mcp_repo_url:
        description: 'MCP Repository URL (e.g., https://github.com/vikas0105/MCP_Servers)'
        required: true
        default: 'https://github.com/vikas0105/MCP_Servers'
        type: string
      app_repo_url:
        description: 'App Repository URL (e.g., https://github.com/meetpatel1111/WeatherPulse)'
        required: true
        default: 'https://github.com/meetpatel1111/WeatherPulse'
        type: string
      app_repo_branch:
        description: 'App Repository Branch'
        required: true
        default: 'main'
        type: string
      app_dockerfile:
        description: 'Dockerfile content for app (leave empty for default)'
        required: false
        default: ''
        type: string
      run_security_scan:
        description: 'Run security scans only?'
        required: false
        default: false
        type: boolean
      run_terraform:
        description: 'Run Terraform deploy?'
        required: false
        default: false
        type: boolean
      run_application_deployment:
        description: 'Run Weather App deployment?'
        required: false
        default: false
        type: boolean

env:
  TF_DIR: terraform
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  # Shared backend (same RG/SA/container for all envs)
  BACKEND_RG: tfstate-uks-shared-rg
  BACKEND_SA: sttfstateshared
  BACKEND_CONTAINER: tfstate
  ARM_CLIENT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).clientId }}
  ARM_CLIENT_SECRET:   ${{ fromJson(secrets.AZURE_CREDENTIALS).clientSecret }}
  ARM_TENANT_ID:       ${{ fromJson(secrets.AZURE_CREDENTIALS).tenantId }}
  ARM_SUBSCRIPTION_ID: ${{ fromJson(secrets.AZURE_CREDENTIALS).subscriptionId }}

jobs:
  security-scan:
    if: ${{ github.event.inputs.run_security_scan == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Run tfsec (IaC)
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: ${{ env.TF_DIR }}
          format: csv
          soft_fail: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy scan on base images
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: node:18-alpine
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

  terraform-k8s:
    if: github.event.inputs.run_terraform == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          echo "Registering all required Azure providers..."
          az provider register --namespace Microsoft.ContainerService --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.Compute --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          
          # Force provider registration with wait flag
          echo "Ensuring provider registration is complete..."
          az provider register --namespace Microsoft.ContainerService --wait || true
          
          # Verify registration state
          echo "Checking provider registration status..."
          az provider show --namespace Microsoft.ContainerService --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Network --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Compute --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Storage --query "registrationState" -o tsv
          az provider show --namespace Microsoft.ContainerRegistry --query "registrationState" -o tsv

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform Cache
        run: |
          cd terraform
          rm -rf .terraform
          rm -f terraform.lock.hcl
          echo "Terraform cache cleaned"

      - name: Set ENV
        run: |
          echo "ENVIRONMENT=${{ github.event.inputs.environment }}" >> $GITHUB_ENV
          echo "TFVARS_FILE=${{ github.event.inputs.environment }}.tfvars" >> $GITHUB_ENV

      - name: Pre-bootstrap Terraform backend
        run: |
          chmod +x ./terraform/bootstrap/prebootstrap.sh
          ./terraform/bootstrap/prebootstrap.sh \
            "${BACKEND_RG}" \
            "${BACKEND_SA}" \
            "${BACKEND_CONTAINER}" \
            "eastus"

      - name: Terraform Init (Remote azurerm Backend - shared SA)
        run: |
          set -euo pipefail
          cd "${TF_DIR}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          RG_NAME="${BACKEND_RG}"
          SA_NAME="${BACKEND_SA}"
          CONTAINER_NAME="${BACKEND_CONTAINER}"
          KEY_PATH="aks/${ENVIRONMENT}.tfstate"

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${RG_NAME}" \
            -backend-config="storage_account_name=${SA_NAME}" \
            -backend-config="container_name=${CONTAINER_NAME}" \
            -backend-config="key=${KEY_PATH}"

      - name: Terraform Fmt
        run: |
          cd "${TF_DIR}"
          terraform fmt -check -recursive

      - name: Terraform Validate
        run: |
          cd "${TF_DIR}"
          terraform validate

      - name: Execute Terraform
        run: |
          cd "${TF_DIR}"
          ACTION="${{ github.event.inputs.action }}"
          case "$ACTION" in
            apply)
              terraform plan -input=false -var-file="$TFVARS_FILE" -out=tfplan
              terraform apply -input=false -auto-approve tfplan
              ;;
            destroy)
              terraform plan -destroy -input=false -var-file="$TFVARS_FILE" -out=tfplan-destroy
              terraform apply -input=false -auto-approve tfplan-destroy
              ;;
            refresh)
              terraform refresh -input=false -var-file="$TFVARS_FILE"
              ;;
            *)
              echo "Unknown action: $ACTION"
              exit 1
              ;;
          esac

  weather-app-deploy:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Register Azure Providers
        run: |
          echo "Registering all required Azure providers..."
          az provider register --namespace Microsoft.ContainerService --wait
          az provider register --namespace Microsoft.Network --wait
          az provider register --namespace Microsoft.Compute --wait
          az provider register --namespace Microsoft.Storage --wait
          az provider register --namespace Microsoft.ContainerRegistry --wait
          
          # Force provider registration with wait flag
          echo "Ensuring provider registration is complete..."
          az provider register --namespace Microsoft.ContainerService --wait || true
          
          # Verify registration state
          echo "Checking provider registration status..."
          az provider show --namespace Microsoft.ContainerService --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Network --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Compute --query "registrationState" -o tsv
          az provider show --namespace Microsoft.Storage --query "registrationState" -o tsv
          az provider show --namespace Microsoft.ContainerRegistry --query "registrationState" -o tsv

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.14.8

      - name: Clean Terraform Cache
        run: |
          cd terraform
          rm -rf .terraform
          rm -f terraform.lock.hcl
          echo "Terraform cache cleaned"

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Verify kubectl version
        run: kubectl version --client

      # ---------- read TF outputs & get kubeconfig ----------
      - name: Terraform Init (for reading outputs) — shared backend
        run: |
          cd "${TF_DIR}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"
          RG_NAME="${BACKEND_RG}"
          SA_NAME="${BACKEND_SA}"
          CONTAINER_NAME="${BACKEND_CONTAINER}"
          KEY_PATH="aks/${ENVIRONMENT}.tfstate"

          terraform init -input=false -reconfigure \
            -backend-config="resource_group_name=${RG_NAME}" \
            -backend-config="storage_account_name=${SA_NAME}" \
            -backend-config="container_name=${CONTAINER_NAME}" \
            -backend-config="key=${KEY_PATH}"

      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      # ---------- ACR login & build/push ----------
      - name: Fetch ACR outputs & login
        run: |
          ACR_NAME=$(terraform -chdir="${TF_DIR}" output -raw acr_name)
          ACR_SERVER=$(terraform -chdir="${TF_DIR}" output -raw acr_login_server)
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          az acr login --name "$ACR_NAME"

      - name: Build & Push App Image (ACR)
        run: |
          TAG="${{ github.event.inputs.environment }}"       
          APP_IMAGE="${ACR_SERVER}/app:${TAG}"
          echo "APP_IMAGE=$APP_IMAGE" >> $GITHUB_ENV
          
          # Clone app repository
          git clone ${{ github.event.inputs.app_repo_url }}
          REPO_NAME=$(basename "${{ github.event.inputs.app_repo_url }}" .git)
          cd "$REPO_NAME"
          
          # Checkout specific branch if provided
          if [ "${{ github.event.inputs.app_repo_branch }}" != "main" ]; then
            git checkout "${{ github.event.inputs.app_repo_branch }}"
          fi
          
          # Create Dockerfile
          if [ -n "${{ github.event.inputs.app_dockerfile }}" ]; then
            # Use custom Dockerfile from input
            echo "${{ github.event.inputs.app_dockerfile }}" > Dockerfile
          else
            # Check if Dockerfile exists, if not create default for WeatherPulse
            if [ ! -f "Dockerfile" ]; then
              # Default Dockerfile for WeatherPulse static web app
              printf "FROM nginx:alpine\nCOPY index.html /usr/share/nginx/html/\nCOPY script.js /usr/share/nginx/html/\nCOPY styles.css /usr/share/nginx/html/\nRUN echo 'server { listen 80; root /usr/share/nginx/html; index index.html; location / { try_files \$uri \$uri/ /index.html; } }' > /etc/nginx/conf.d/default.conf\nEXPOSE 80\nCMD [\"nginx\", \"-g\", \"daemon off;\"]\n" > Dockerfile
            fi
          fi
          
          # Build and push app image
          docker build --no-cache -t "$APP_IMAGE" .
          docker push "$APP_IMAGE"

      - name: Build & Push MCP Servers Image (ACR)
        run: |
          TAG="${{ github.event.inputs.environment }}"       
          MCP_SERVERS_IMAGE="${ACR_SERVER}/mcp-servers:${TAG}"
          echo "MCP_SERVERS_IMAGE=$MCP_SERVERS_IMAGE" >> $GITHUB_ENV
          
          # Clone MCP Servers repository with correct branch
          git clone ${{ github.event.inputs.mcp_repo_url }}
          cd MCP_Servers
          git checkout codex/build-mcp-server-for-kubernetes
          
          # Build and push MCP Servers image
          docker build --no-cache -t "$MCP_SERVERS_IMAGE" .
          docker push "$MCP_SERVERS_IMAGE"

      - name: Run Trivy scan on MCP servers
        if: ${{ github.event.inputs.run_security_scan == 'true' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.MCP_SERVERS_IMAGE }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        env:
          MCP_SERVERS_IMAGE: ${{ env.MCP_SERVERS_IMAGE }}

      - name: Run Trivy scan on app
        if: ${{ github.event.inputs.run_security_scan == 'true' }}
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.APP_IMAGE }}
          format: table
          exit-code: '0'
          severity: 'CRITICAL,HIGH'
        env:
          APP_IMAGE: ${{ env.APP_IMAGE }}

      - name: Create Kubernetes Secrets
        if: ${{ github.event.inputs.run_application_deployment == 'true' }}
        run: |
          # Create weather-app-secret with AI keys only (Open-Meteo doesn't require API key)
          kubectl create secret generic weather-app-secret \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }} \
            --from-literal=OPEN_METEO_API_KEY=${{ secrets.OPEN_METEO_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Export replicas and HPA settings from TFVARS
        run: |
          TFVARS_FILE="${{ github.event.inputs.environment }}.tfvars"
          ENVFILE="${TF_DIR}/${TFVARS_FILE}"
          export K8SGPT_REPLICAS=$(grep k8sgpt_replicas "$ENVFILE" | awk -F'=' '{print $2}' | xargs)
          export APP_REPLICAS=$(grep app_replicas "$ENVFILE" | awk -F'=' '{print $2}' | xargs || echo "2")

          export K8SGPT_HPA_MIN=$K8SGPT_REPLICAS
          export K8SGPT_HPA_MAX=$(grep k8sgpt_hpa_max "$ENVFILE" | awk -F'=' '{print $2}' | xargs)
          export APP_HPA_MIN=$APP_REPLICAS
          export APP_HPA_MAX=$(grep app_hpa_max "$ENVFILE" | awk -F'=' '{print $2}' | xargs || echo "5")

          echo "K8SGPT_REPLICAS=$K8SGPT_REPLICAS" >> $GITHUB_ENV
          echo "APP_REPLICAS=$APP_REPLICAS" >> $GITHUB_ENV
          echo "K8SGPT_REPLICAS_MIN=$K8SGPT_HPA_MIN" >> $GITHUB_ENV
          echo "K8SGPT_REPLICAS_MAX=$K8SGPT_HPA_MAX" >> $GITHUB_ENV
          echo "APP_REPLICAS_MIN=$APP_HPA_MIN" >> $GITHUB_ENV
          echo "APP_REPLICAS_MAX=$APP_HPA_MAX" >> $GITHUB_ENV

      - name: Deploy External MCP Integration
        if: ${{ github.event.inputs.run_application_deployment == 'true' }}
        run: |
          PROVIDER="${{ github.event.inputs.mcp_provider }}"
          MCP_REPO_URL="${{ github.event.inputs.mcp_repo_url }}"
          MCP_REPO_BRANCH="codex/build-mcp-server-for-kubernetes"
          echo "MCP_PROVIDER=$PROVIDER" >> $GITHUB_ENV
          echo "MCP_REPO_URL=$MCP_REPO_URL" >> $GITHUB_ENV
          
          # Set replica variables
          echo "MCP_REPLICAS_MIN=1" >> $GITHUB_ENV
          echo "MCP_REPLICAS_MAX=3" >> $GITHUB_ENV
          
          # Clone and deploy external MCP repository
          echo "Cloning MCP repository: $MCP_REPO_URL"
          git clone $MCP_REPO_URL ./mcp-repo
          cd ./mcp-repo
          
          # Checkout specific branch for MCP server
          git checkout $MCP_REPO_BRANCH
          echo "Checked out branch: $MCP_REPO_BRANCH"
          
          # Check if MCP repo has Dockerfile
          if [ -f "Dockerfile" ]; then
            echo "Building and deploying MCP from Dockerfile..."
            MCP_IMAGE="${ACR_SERVER}/mcp-servers:${{ github.event.inputs.environment }}"
            
            # Export for current step (envsubst, bash commands)
            export MCP_IMAGE=$MCP_IMAGE
            
            # Save for next steps
            echo "MCP_IMAGE=$MCP_IMAGE" >> $GITHUB_ENV
            
            # Debug verification
            echo "DEBUG MCP_IMAGE=$MCP_IMAGE"
            env | grep MCP_IMAGE
              
            docker build --no-cache -t "$MCP_IMAGE" .
            docker push "$MCP_IMAGE"
            cd ..
            
            # Deploy MCP using existing manifests
            # Ensure MCP_IMAGE is exported for envsubst
            export MCP_IMAGE="$MCP_IMAGE"
            echo "DEBUG MCP_IMAGE for envsubst: $MCP_IMAGE"
            env | grep MCP_IMAGE
            
            cp k8s/mcp-server/deployment.yaml k8s/temp.yaml && envsubst < k8s/temp.yaml > k8s/mcp-server/deployment.yaml && rm k8s/temp.yaml
            kubectl apply -f k8s/mcp-server/rbac.yaml
            kubectl apply -f k8s/mcp-server/deployment.yaml
            kubectl apply -f k8s/mcp-server/service.yaml
            
          else
            echo "No Dockerfile found in MCP repository. Please check repository structure."
            exit 1
          fi

      - name: Apply Kubernetes Deployments & Services (Azure)
        run: |
          kubectl apply -f https://raw.githubusercontent.com/kubernetes/ingress-nginx/controller-v1.13.0/deploy/static/provider/cloud/deploy.yaml
          
          # Debug: Check pod status before waiting
          echo "=== Checking ingress-nginx pod status ==="
          kubectl get pods -n ingress-nginx -o wide
          kubectl describe pods -n ingress-nginx -l app.kubernetes.io/component=controller
          
          # Wait with longer timeout and continue on failure for debugging
          kubectl wait --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=600s || echo "⚠️ Warning: ingress-nginx controller not ready, continuing for debugging..."
          
          # Debug: Show pod logs if not ready
          echo "=== ingress-nginx controller logs ==="
          kubectl logs -n ingress-nginx -l app.kubernetes.io/component=controller --tail=50 || true

          PROVIDER="${{ github.event.inputs.mcp_provider }}"
          ENVIRONMENT="${{ github.event.inputs.environment }}"

          # Wait for the ingress-nginx Service LoadBalancer IP (or hostname)
          echo "Waiting for ingress-nginx controller LoadBalancer IP..."
          LB_SVC_NS=ingress-nginx
          LB_SVC_NAME=ingress-nginx-controller
          MAX_ATTEMPTS=30
          SLEEP_SECS=10
          EXTERNAL_IP=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            # first try ip, then hostname (some Azure setups use ip, some use hostname)
            EXTERNAL_IP=$(kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -z "$EXTERNAL_IP" ]; then
              EXTERNAL_IP=$(kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            fi

            if [ -n "$EXTERNAL_IP" ]; then
              echo "Found ingress controller LB: $EXTERNAL_IP"
              break
            fi

            echo "Attempt $i/$MAX_ATTEMPTS - LB IP not yet assigned. Sleeping ${SLEEP_SECS}s..."
            sleep $SLEEP_SECS
          done

          if [ -z "$EXTERNAL_IP" ]; then
            echo "ERROR: ingress controller LoadBalancer IP/hostname was not assigned within timeout."
            echo "Check: kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o wide"
            exit 1
          fi

          # Convert IP to nip.io compatible format (CRITICAL FIX)
          EXTERNAL_IP_DASHED=$(echo $EXTERNAL_IP | sed 's/\./-/g')

          # Export dashed IP for envsubst
          export EXTERNAL_IP=$EXTERNAL_IP_DASHED
          echo "EXTERNAL_IP=$EXTERNAL_IP_DASHED" >> $GITHUB_ENV

          echo "✅ Converted IP for nip.io: $EXTERNAL_IP"

          # Render & apply application manifests with envsubst
          cp k8s/app-deployment.yaml k8s/temp.yaml && envsubst < k8s/temp.yaml > k8s/app-deployment.yaml && rm k8s/temp.yaml && kubectl apply -f k8s/app-deployment.yaml
          cp k8s/main-ingress.yaml k8s/temp.yaml && envsubst < k8s/temp.yaml > k8s/main-ingress.yaml && rm k8s/temp.yaml && kubectl apply -f k8s/main-ingress.yaml

          # Ensure core deployments roll out
          kubectl -n default rollout status deployment/app --timeout=120s || echo "app rollout status timed out or deployment not found (continuing)"

      - name: Wait for LoadBalancer IP
        run: |
          echo "Waiting for ingress-nginx LoadBalancer IP..."
          for i in {1..30}; do
            EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$EXTERNAL_IP" ]; then
              echo "Found ingress IP: $EXTERNAL_IP"
              break
            fi
            echo "Attempt $i/30 - LB IP not yet assigned. Sleeping 10s..."
            sleep 10
          done

      - name: Create Ingress for Weather App and MCP Services
        run: |
          EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          PROVIDER="${{ github.event.inputs.mcp_provider }}"
          echo "EXTERNAL_IP=${EXTERNAL_IP}" >> $GITHUB_ENV
          echo "PROVIDER=${PROVIDER}" >> $GITHUB_ENV
          
          # Apply MCP ingress with environment substitution
          cp k8s/mcp-server/ingress.yaml k8s/temp.yaml && envsubst < k8s/temp.yaml > k8s/mcp-server/ingress.yaml && rm k8s/temp.yaml && kubectl apply -f k8s/mcp-server/ingress.yaml
          envsubst < k8s/mcp-server/ingress.yaml | kubectl apply -f -

      - name: Verify Deployments
        run: |
          echo "=== Weather App Deployment Status ==="
          kubectl get pods -l app=weather
          kubectl get services -l app=weather
          kubectl get ingress -l app=weather
          
          echo "=== MCP Integration Status ==="
          kubectl get pods -l component=mcp-integration
          kubectl get services -l component=mcp-integration
          
          echo "=== Ingress Status ==="
          kubectl get ingress -A
          
          echo "=== Access Information ==="
          echo "Weather App: http://weather.${EXTERNAL_IP}.nip.io"
          echo "MCP Services: http://mcp.${EXTERNAL_IP}.nip.io"
          echo "Prometheus: http://prometheus.${EXTERNAL_IP}.nip.io"
          echo "Grafana: http://grafana.${EXTERNAL_IP}.nip.io"

      - name: Test Weather App Health
        run: |
          EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          echo "Testing weather app health..."
          
          # Test health endpoint
          curl -f "http://weather.${EXTERNAL_IP}.nip.io/health" || exit 1
          
          # Test weather endpoint
          curl -f "http://weather.${EXTERNAL_IP}.nip.io/weather/current/London" || exit 1
          
          # Test MCP endpoint
          curl -f -X POST "http://weather.${EXTERNAL_IP}.nip.io/mcp/weather" \
            -H "Content-Type: application/json" \
            -d '{"method":"get_current_weather","params":{"city":"London"}}' || exit 1

      - name: Test MCP Integration
        run: |
          EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          PROVIDER="${{ github.event.inputs.mcp_provider }}"
          SERVICE_NAME=$([ "$PROVIDER" == "openai" ] && echo "openai-mcp-service" || echo "google-mcp-service")
          SERVICE_PORT=$([ "$PROVIDER" == "openai" ] && echo "8080" || echo "8081")
          
          echo "Testing MCP integration with $PROVIDER..."
          
          # Test MCP service health
          kubectl port-forward service/$SERVICE_NAME $SERVICE_PORT:8080 &
          PORT_FORWARD_PID=$!
          
          sleep 5
          
          # Test MCP service
          curl -f "http://localhost:$SERVICE_PORT/health" || echo "MCP service not ready yet"
          
          # Stop port forward
          kill $PORT_FORWARD_PID 2>/dev/null || true

  verify-deployment:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    needs: [weather-app-deploy, mcp-server-deploy]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      - name: Verify Kubernetes Deployments & Services
        run: |
          kubectl get nodes -o wide
          kubectl get deployments -A
          kubectl get svc -A
          kubectl get ingress -A
          kubectl get hpa -A

  mcp-server-deploy:
    if: ${{ github.event.inputs.run_application_deployment == 'true' }}
    needs: weather-app-deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v5

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Verify kubectl version
        run: kubectl version --client

      # ---------- get kubeconfig ----------
      - name: Get AKS kubeconfig
        run: |
          RG_NAME=$(terraform -chdir="${TF_DIR}" output -raw resource_group_name)
          CLUSTER_NAME=$(terraform -chdir="${TF_DIR}" output -raw cluster_name)
          az aks get-credentials -g "$RG_NAME" -n "$CLUSTER_NAME" --overwrite-existing

      # ---------- Build and Push MCP Server Image ----------
      - name: Fetch ACR outputs & login
        run: |
          ACR_NAME=$(terraform -chdir="${TF_DIR}" output -raw acr_name)
          ACR_SERVER=$(terraform -chdir="${TF_DIR}" output -raw acr_login_server)
          echo "ACR_NAME=$ACR_NAME" >> $GITHUB_ENV
          echo "ACR_SERVER=$ACR_SERVER" >> $GITHUB_ENV
          az acr login --name "$ACR_NAME"

      - name: Create Kubernetes Secret for MCP Servers
        run: |
          kubectl create secret generic mcp-servers-secret \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Build & Push MCP Server Image (ACR)
        run: |
          TAG="${{ github.event.inputs.environment }}"       
          MCP_IMAGE="${ACR_SERVER}/mcp-servers:${TAG}"
          
          # Export for current step
          export MCP_IMAGE=$MCP_IMAGE
          
          # Save for next steps
          echo "MCP_IMAGE=$MCP_IMAGE" >> $GITHUB_ENV
          
          # Debug verification
          echo "DEBUG MCP_IMAGE=$MCP_IMAGE"
          
          # Clone MCP Servers repository with correct branch
          git clone ${{ github.event.inputs.mcp_repo_url }}
          cd MCP_Servers
          git checkout codex/build-mcp-server-for-kubernetes
          
          # Build and push MCP Servers image
          docker build --no-cache -t "$MCP_IMAGE" .
          docker push "$MCP_IMAGE"
          
          # Export MCP_IMAGE for deployment step
          echo "MCP_IMAGE=$MCP_IMAGE" >> $GITHUB_ENV

      # ---------- Deploy MCP Server ----------
      - name: Deploy MCP Server to Kubernetes
        run: |
          echo "Deploying MCP Server..."
          
          # MCP_IMAGE should already be exported from previous step, but ensure it's available
          MCP_IMAGE="${ACR_SERVER}/mcp-servers:${{ github.event.inputs.environment }}"
          
          # Export for current step (envsubst)
          export MCP_IMAGE=$MCP_IMAGE
          
          # Save for next steps
          echo "MCP_IMAGE=$MCP_IMAGE" >> $GITHUB_ENV
          
          # Debug verification
          echo "DEBUG MCP_IMAGE is: $MCP_IMAGE"
          env | grep MCP_IMAGE
          
          # Update deployment with correct image (proven pattern from main deployment)
          cp k8s/mcp-server/deployment.yaml k8s/mcp-server/temp.yaml && envsubst < k8s/mcp-server/temp.yaml > k8s/mcp-server/deployment-final.yaml && rm k8s/mcp-server/temp.yaml
          
          # Deploy MCP Server using existing k8s-mcp-server configuration
          kubectl apply -f k8s/mcp-server/rbac.yaml
          kubectl apply -f k8s/mcp-server/deployment-final.yaml
          kubectl apply -f k8s/mcp-server/service.yaml

      - name: Create MCP Server Ingress
        run: |
          # Wait for the ingress-nginx Service LoadBalancer IP (or hostname) - using same pattern as main deployment
          echo "Waiting for ingress-nginx controller LoadBalancer IP for MCP server..."
          LB_SVC_NS=ingress-nginx
          LB_SVC_NAME=ingress-nginx-controller
          MAX_ATTEMPTS=20
          SLEEP_SECS=15
          EXTERNAL_IP=""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            # first try ip, then hostname (some Azure setups use ip, some use hostname)
            EXTERNAL_IP=$(kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -z "$EXTERNAL_IP" ]; then
              EXTERNAL_IP=$(kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            fi

            if [ -n "$EXTERNAL_IP" ]; then
              echo "✅ Found ingress controller LB for MCP: $EXTERNAL_IP"
              break
            fi

            echo "⏳ Attempt $i/$MAX_ATTEMPTS - LB IP not yet assigned. Sleeping ${SLEEP_SECS}s..."
            sleep $SLEEP_SECS
          done

          if [ -z "$EXTERNAL_IP" ]; then
            echo "❌ ERROR: ingress controller LoadBalancer IP/hostname was not assigned within timeout."
            echo "Check: kubectl -n $LB_SVC_NS get svc $LB_SVC_NAME -o wide"
            exit 1
          fi

          # Export for current step (envsubst) and future steps
          export EXTERNAL_IP=$EXTERNAL_IP
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV
          
          # Debug verification
          echo "DEBUG EXTERNAL_IP for MCP ingress: $EXTERNAL_IP"
          env | grep EXTERNAL_IP
          
          # Verify EXTERNAL_IP is not empty before proceeding
          if [ -z "$EXTERNAL_IP" ]; then
            echo "❌ CRITICAL: EXTERNAL_IP is still empty after retry attempts!"
            echo "🔍 Debugging ingress controller status:"
            kubectl -n ingress-nginx get svc ingress-nginx-controller -o wide
            echo "🔍 All services in ingress-nginx namespace:"
            kubectl -n ingress-nginx get svc -o wide
            exit 1
          fi
          
          # Use existing ingress configuration with envsubst (proven pattern from main deployment)
          cp k8s/mcp-server/ingress.yaml k8s/mcp-server/temp.yaml && envsubst < k8s/mcp-server/temp.yaml > k8s/mcp-server/ingress.yaml && rm k8s/mcp-server/temp.yaml
          
          # Verify substitution worked
          if grep -q "\${EXTERNAL_IP}" k8s/mcp-server/ingress.yaml; then
            echo "❌ envsubst failed - still contains \${EXTERNAL_IP}"
            echo "🔧 Trying sed fallback..."
            sed -i "s/\${EXTERNAL_IP}/$EXTERNAL_IP/g" k8s/mcp-server/ingress.yaml
          fi
          
          echo "Generated MCP ingress file:"
          cat k8s/mcp-server/ingress.yaml
          
          # Final verification before applying
          if grep -q "\${EXTERNAL_IP}" k8s/mcp-server/ingress.yaml; then
            echo "❌ CRITICAL: Ingress still contains unsubstituted variables!"
            exit 1
          fi
          
          kubectl apply -f k8s/mcp-server/ingress.yaml

      - name: Wait for MCP Server deployment
        run: |
          echo "Waiting for MCP Server deployment..."
          kubectl -n sre-copilot wait --for=condition=available deployment/k8s-mcp-web --timeout=300s

      - name: Verify MCP Server deployment
        run: |
          echo "Verifying MCP Server deployment..."
          kubectl -n sre-copilot get pods
          kubectl -n sre-copilot get services
          kubectl -n sre-copilot get ingress
          kubectl -n sre-copilot logs deploy/k8s-mcp-web --tail=20

      - name: Display MCP Server URLs
        run: |
          echo "🎉 MCP Server deployment completed!"
          echo ""
          echo "🌐 MCP Server Web UI URL: http://k8s-mcp.${EXTERNAL_IP}.nip.io/"
          echo "📊 Access the Web UI at the URL above"
          echo ""
          echo "🔧 To run the MCP server locally:"
          echo "   git clone ${{ github.event.inputs.mcp_repo_url }}"
          echo "   cd MCP_Servers"
          echo "   git checkout codex/build-mcp-server-for-kubernetes"
          echo "   python -m venv .venv && source .venv/bin/activate"
          echo "   pip install -e .[dev]"
          echo "   python src/mcp_server.py"
          
          # Check ingress
          kubectl get ingress -A
          
          # Check pods with detailed status
          kubectl get pods -A -o wide
          
          # Check HPA if exists
          kubectl get hpa -A || echo "No HPA resources found"
          
          # Check metrics
          kubectl get servicemonitors -A || echo "No ServiceMonitors found"
          
          # Get external IP for access testing
          EXTERNAL_IP=$(kubectl -n ingress-nginx get svc ingress-nginx-controller \
            -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
          
          # Export for current step
          export EXTERNAL_IP=$EXTERNAL_IP
          
          # Save for next steps
          echo "EXTERNAL_IP=$EXTERNAL_IP" >> $GITHUB_ENV
          
          # Debug verification
          echo "DEBUG EXTERNAL_IP=$EXTERNAL_IP"
          env | grep EXTERNAL_IP
          
          echo "App URL:             http://app.${EXTERNAL_IP}.nip.io/"
          echo "K8s MCP URL:         http://k8s-mcp.${EXTERNAL_IP}.nip.io/"
            
          echo "=== Health Check Results ==="
          curl -s "http://weather.${EXTERNAL_IP}.nip.io/health" | jq .status
          else
            echo "External IP not yet assigned. Please check ingress status."