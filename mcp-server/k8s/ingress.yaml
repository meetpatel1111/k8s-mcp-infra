apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: k8s-mcp-ingress
  namespace: sre-copilot
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  rules:
  - host: k8s-mcp.${EXTERNAL_IP}.nip.io
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: k8s-mcp-web
            port:
              number: 80
